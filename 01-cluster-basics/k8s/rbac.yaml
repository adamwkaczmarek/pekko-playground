# =============================================================================
# RBAC for Pekko Cluster Bootstrap (kubernetes-api discovery).
#
# Cluster Bootstrap needs permission to LIST and GET pods so it can find other
# cluster members.  This is the minimum required set of permissions.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pekko-cluster
  namespace: pekko-demo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pekko-cluster-role
  namespace: pekko-demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pekko-cluster-binding
  namespace: pekko-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pekko-cluster-role
subjects:
  - kind: ServiceAccount
    name: pekko-cluster
    namespace: pekko-demo
