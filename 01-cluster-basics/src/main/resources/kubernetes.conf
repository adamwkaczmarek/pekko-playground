# =============================================================================
# Kubernetes overlay — include this instead of application.conf when running
# in a Kubernetes cluster.
#
# Activate: add -Dconfig.resource=kubernetes.conf to JVM args (see Dockerfile /
# k8s/deployment.yaml).
#
# Differences from local config:
#   • hostname comes from the POD_IP environment variable (Downward API)
#   • seed-nodes is cleared — Cluster Bootstrap discovers peers via the k8s API
#   • management port is fixed so the Service selector can target it
# =============================================================================

include "application"

pekko {

  remote.artery.canonical {
    # POD_IP is injected by Kubernetes Downward API (see deployment.yaml).
    # Each pod needs its OWN IP as the canonical hostname so other pods can
    # route Artery traffic directly to it.
    hostname = ${POD_IP}
    port     = 25520
  }

  cluster {
    # Clear static seed nodes — Cluster Bootstrap takes over discovery.
    seed-nodes = []

    # Give bootstrap more time to contact peers on first start.
    shutdown-after-unsuccessful-join-seed-nodes = 60s
  }

  management {
    http {
      hostname = "0.0.0.0"
      port     = 8558
    }

    # ── Cluster Bootstrap ───────────────────────────────────────────────────
    # Bootstrap contacts the Kubernetes API, lists pods matching our label
    # selector, pings their management HTTP endpoints, and coordinates which
    # pod should form the first seed of the cluster.
    #
    # Requires the RBAC Role in k8s/rbac.yaml (permission to list/get pods).
    cluster.bootstrap {
      contact-point-discovery {
        discovery-method = kubernetes-api
        # Matches the headless Service name in k8s/service.yaml
        service-name     = "pekko-cluster-headless"
        port-name        = "management"
        # Minimum number of pods that must respond before forming the cluster.
        # Set to ≥ 2 in production to avoid a single pod forming a split cluster.
        required-contact-point-nr = 1
      }
    }
  }

  discovery {
    kubernetes-api {
      pod-namespace     = "pekko-demo"
      pod-label-selector = "app=pekko-cluster"
      pod-port-name     = "management"
    }
  }
}
