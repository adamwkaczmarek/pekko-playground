# =============================================================================
# Pekko Cluster — local development configuration
#
# To start a 3-node local cluster run:
#   sbt -Dpekko.remote.artery.canonical.port=25520 run   # node 1 (seed)
#   sbt -Dpekko.remote.artery.canonical.port=25521 \
#       -Dpekko.management.http.port=8559 run             # node 2
#   sbt -Dpekko.remote.artery.canonical.port=25522 \
#       -Dpekko.management.http.port=8560 run             # node 3
#
# For Kubernetes use kubernetes.conf (pass -Dconfig.resource=kubernetes.conf).
# =============================================================================

pekko {

  loglevel = "INFO"
  log-dead-letters = 10
  log-dead-letters-during-shutdown = false

  # ── Serialization ──────────────────────────────────────────────────────────
  # Messages that cross node boundaries (cluster, sharding, remote) must be
  # serialized.  We register our marker trait CborSerializable → jackson-cbor.
  # Every message class that leaves the local JVM should extend this trait.
  actor {
    provider = "cluster"

    serialization-bindings {
      "com.example.CborSerializable" = jackson-cbor
    }
  }

  # ── Transport ──────────────────────────────────────────────────────────────
  # Artery is the modern TCP/TLS transport for Pekko Remoting.
  # canonical.hostname / port = the address OTHER nodes use to reach this node.
  # Override port per-node with -Dpekko.remote.artery.canonical.port=...
  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?PEKKO_HOSTNAME}   # env var override (used in Docker/k8s)
      port     = 25520
      port     = ${?PEKKO_PORT}
    }
  }

  # ── Cluster ────────────────────────────────────────────────────────────────
  cluster {
    # Seed nodes are the initial contact points for cluster formation.
    # Any node listed here can act as the seed — the first one to start
    # becomes the "first seed" and all others join through it.
    #
    # Rules:
    #   • List at least 2–3 addresses so the cluster can form even if one
    #     seed is not the first to start.
    #   • The address must use the canonical hostname/port configured above.
    #   • In Kubernetes this list is set to [] and bootstrap handles discovery.
    seed-nodes = [
      "pekko://ClusterSystem@127.0.0.1:25520",
      "pekko://ClusterSystem@127.0.0.1:25521",
      "pekko://ClusterSystem@127.0.0.1:25522"
    ]

    # ── Split Brain Resolver ─────────────────────────────────────────────────
    # A network partition can split the cluster into two sides that both think
    # the other is dead.  Without an SBR you get a "split brain" where two
    # independent sub-clusters accept writes, leading to data inconsistency.
    #
    # keep-majority: the side with the majority of nodes survives and downs
    # the minority.  For a 3-node cluster this means losing 1 node is safe;
    # losing 2 nodes means the surviving node downs itself too.
    #
    # Other strategies: keep-oldest, static-quorum, down-all, lease-majority
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy        = keep-majority
      stable-after           = 10s  # wait this long before acting
    }

    # Abort startup if we can't join the cluster within this window.
    shutdown-after-unsuccessful-join-seed-nodes = 30s
  }

  # ── Management HTTP ────────────────────────────────────────────────────────
  # Exposes cluster state, health checks, and member management over HTTP.
  # Try:  curl http://localhost:8558/cluster/members | jq .
  #       curl http://localhost:8558/health/ready
  management {
    http {
      hostname = "0.0.0.0"
      port     = 8558
      port     = ${?PEKKO_MANAGEMENT_PORT}
      # Set to false to allow PUT/DELETE member management endpoints
      route-providers-read-only = false
    }
  }
}
