# =============================================================================
# UserService — Kubernetes configuration (overrides user-service.conf)
#
# Loaded when CONFIG_RESOURCE=kubernetes-user-service is set in the container.
# Key differences from local dev:
#   - POD_IP used as canonical hostname (set via downwardAPI in the pod spec)
#   - seed-nodes cleared → triggers Cluster Bootstrap (kubernetes-api discovery)
#   - discovery uses pod label selector app=user-service
# =============================================================================

include "user-service"

pekko {

  remote.artery.canonical {
    hostname = ${POD_IP}
    port     = 25510
  }

  cluster {
    # Empty list activates Cluster Bootstrap (see UserServiceApp: if isEmpty → start bootstrap)
    seed-nodes = []

    shutdown-after-unsuccessful-join-seed-nodes = 60s
  }

  management {
    http {
      hostname = ${POD_IP}
      port     = 8558
    }

    cluster.bootstrap.contact-point-discovery {
      discovery-method          = kubernetes-api
      service-name              = "user-service"
      # At least 2 pods must be ready before forming a new cluster
      required-contact-point-nr = 2
    }
  }

  discovery {
    method = kubernetes-api
    kubernetes-api {
      # Matches pods labelled app=user-service in the same namespace
      pod-label-selector = "app=user-service"
      pod-port-name      = "management"
    }
  }
}
