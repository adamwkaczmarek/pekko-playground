# =============================================================================
# UserService — local development configuration
#
# Start:
#   sbt "02-microservices/runMain com.example.users.UserServiceApp"
#
# API:
#   POST /users/{id}   — register user:  {"name": "Jan", "email": "jan@example.com"}
#   GET  /users/{id}   — get profile
# =============================================================================

pekko {

  loglevel = "INFO"
  log-dead-letters = 10
  log-dead-letters-during-shutdown = false

  actor {
    provider = "cluster"
    serialization-bindings {
      "com.example.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?PEKKO_HOSTNAME}
      port     = 25510
      port     = ${?PEKKO_PORT}
    }
  }

  cluster {
    # Single-node seed for local dev.
    # In production: use Cluster Bootstrap (set seed-nodes = []).
    seed-nodes = ["pekko://UserService@127.0.0.1:25510"]

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-majority
      stable-after    = 10s
    }

    shutdown-after-unsuccessful-join-seed-nodes = 30s
  }

  management {
    http {
      hostname = "0.0.0.0"
      port     = 8558
      port     = ${?PEKKO_MANAGEMENT_PORT}
      route-providers-read-only = false
    }
  }
}

# HTTP API port for UserService
user-service.http.port = 8081
user-service.http.port = ${?USER_SERVICE_HTTP_PORT}
