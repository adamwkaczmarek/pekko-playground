# =============================================================================
# OrderService — Kubernetes configuration (overrides order-service.conf)
#
# Loaded when CONFIG_RESOURCE=kubernetes-order-service is set in the container.
# =============================================================================

include "order-service"

pekko {

  remote.artery.canonical {
    hostname = ${POD_IP}
    port     = 25520
  }

  cluster {
    seed-nodes = []

    shutdown-after-unsuccessful-join-seed-nodes = 60s
  }

  management {
    http {
      hostname = ${POD_IP}
      port     = 8568
    }

    cluster.bootstrap.contact-point-discovery {
      discovery-method          = kubernetes-api
      service-name              = "order-service"
      required-contact-point-nr = 2
    }
  }

  discovery {
    method = kubernetes-api
    kubernetes-api {
      pod-label-selector = "app=order-service"
      pod-port-name      = "management"
    }
  }
}

# DNS name of UserService inside the cluster
user-service.base-url = "http://user-service:8081"
