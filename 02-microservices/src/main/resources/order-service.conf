# =============================================================================
# OrderService — local development configuration
#
# Requires UserService to be running first (default: http://127.0.0.1:8081).
#
# Start:
#   sbt "02-microservices/runMain com.example.orders.OrderServiceApp"
#
# API:
#   POST /orders         — place order: {"userId": "user-1", "items": ["shoe", "hat"]}
#   GET  /orders/{id}    — get order by id
# =============================================================================

pekko {

  loglevel = "INFO"
  log-dead-letters = 10
  log-dead-letters-during-shutdown = false

  actor {
    provider = "cluster"
    serialization-bindings {
      "com.example.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?PEKKO_HOSTNAME}
      port     = 25520
      port     = ${?PEKKO_PORT}
    }
  }

  cluster {
    # Separate cluster from UserService — different ports, different system name.
    seed-nodes = ["pekko://OrderService@127.0.0.1:25520"]

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-majority
      stable-after    = 10s
    }

    shutdown-after-unsuccessful-join-seed-nodes = 30s
  }

  management {
    http {
      hostname = "0.0.0.0"
      port     = 8568
      port     = ${?PEKKO_MANAGEMENT_PORT}
      route-providers-read-only = false
    }
  }
}

# HTTP API port for OrderService
order-service.http.port = 8082
order-service.http.port = ${?ORDER_SERVICE_HTTP_PORT}

# Where OrderService can reach UserService — override in Docker/K8s via env var
user-service.base-url = "http://127.0.0.1:8081"
user-service.base-url = ${?USER_SERVICE_URL}
