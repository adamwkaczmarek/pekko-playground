# =============================================================================
# FrontendService — Kubernetes configuration (overrides frontend.conf)
#
# Loaded when CONFIG_RESOURCE=kubernetes-frontend is set in the container.
# Frontend is a stateless Tapir/Netty gateway — no cluster/discovery needed.
# Only the backend URLs are updated to use Kubernetes DNS service names.
# =============================================================================

include "frontend"

# Kubernetes DNS names for the backend ClusterIP services
user-service.base-url  = "http://user-service:8081"
order-service.base-url = "http://order-service:8082"
