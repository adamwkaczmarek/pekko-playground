# =============================================================================
# FrontendService — local development configuration
#
# Stateless API gateway — no Pekko Cluster.
#
# Start:
#   sbt "microservices/runMain com.example.frontend.FrontendApp"
#
# External API (proxied to backends):
#   POST /users/{id}   — register user
#   GET  /users/{id}   — get user profile
#   POST /orders       — place order
#   GET  /orders/{id}  — get order
# =============================================================================

# Frontend is a stateless Tapir/Netty (cats-effect) gateway — no Pekko ActorSystem.

# Public-facing port (the only port exposed outside)
frontend.http.port = 8080
frontend.http.port = ${?FRONTEND_HTTP_PORT}

# Internal backend URLs — change in Docker/K8s via env vars
user-service.base-url  = "http://127.0.0.1:8081"
user-service.base-url  = ${?USER_SERVICE_URL}

order-service.base-url = "http://127.0.0.1:8082"
order-service.base-url = ${?ORDER_SERVICE_URL}
