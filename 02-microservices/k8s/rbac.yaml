# =============================================================================
# RBAC for Pekko Cluster Bootstrap
#
# Cluster Bootstrap (kubernetes-api discovery) needs to list/watch pods to
# find other cluster members. This ServiceAccount is used by all three services;
# only the backend cluster pods actually need pod-list access, but sharing one
# account keeps the setup simple for a playground.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pekko-app
  namespace: pekko-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pekko-pod-reader
  namespace: pekko-demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pekko-pod-reader-binding
  namespace: pekko-demo
subjects:
  - kind: ServiceAccount
    name: pekko-app
    namespace: pekko-demo
roleRef:
  kind: Role
  name: pekko-pod-reader
  apiGroup: rbac.authorization.k8s.io
